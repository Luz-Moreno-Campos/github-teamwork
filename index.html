    <header>
      <div class="menu">

    </header>

    <main>
      <div class="container">
        <h2>Registration Form</h2>

        <form>

            
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">

            
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">

            
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">

            
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number">

            <label for="Address"><Address></label>
            <input type="adress" id="home adress" placeholder="Enter Address" >
            <label for="country">Country</label>
            <select id="country">
                <option>Select your country</option>
                <option>Canada</option>
                <option>USA</option>
                <option>India</option>
            </select>

            
            <label for="message">Message</label>
            <textarea id="message" placeholder="Write something..."></textarea>

            
            <button type="submit">Submit</button>

        </form>
    </div>
    </main>
    
    <footer>
      <div class="icons">
        <p>This is the website where we are learning how we can collaborate with each other using the Github.</p>
